<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islahul Uloom - Smart Madrasa</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div id="login-page" class="page">
            <div class="auth-header">
                <i class="fas fa-mosque logo-icon"></i>
                <h1>Islahul Uloom Madrasa</h1>
                <p>സ്മാർട്ട് മദ്റസ പോർട്ടൽ</p>
            </div>
            <div class="form-container">
                <input type="text" id="login-id" placeholder="User ID">
                <input type="password" id="login-pass" placeholder="Password">
                <button onclick="loginUser()">Login</button>
                <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #666;">കുട്ടികൾക്കും ഐഡി ഉപയോഗിച്ച് ലോഗിൻ ചെയ്യാം</p>
            </div>
        </div>

        <div id="main-dashboard" class="page" style="display:none;">
            <header class="main-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">U</div>
                    <div>
                        <h2 id="display-name">Loading...</h2>
                        <p id="display-role">User</p>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-power-off"></i></button>
            </header>

            <div id="usthad-view" style="display:none;">
                <div class="stats-grid">
    <div class="stat-card" onclick="showSection('student-list')">
        <i class="fas fa-users"></i><span>കുട്ടികൾ</span>
    </div>

    <div class="stat-card" onclick="showSection('add-student')">
        <i class="fas fa-user-plus"></i><span>പുതിയ കുട്ടി</span>
    </div>

    <div id="gurunidhi-btn" class="stat-card" onclick="showSection('gurunidhi')" style="cursor:pointer;">
        <i class="fas fa-box-open"></i><span>ഗുരുനിധി ബോക്സ്</span>
    </div>
        <div class="card" onclick="openSadarSection()" style="background: #e3f2fd; cursor: pointer; padding: 15px; border-radius: 12px; text-align: center;">
    <div style="font-size: 24px; margin-bottom: 8px;">👨‍🏫</div>
    <div style="font-size: 13px; font-weight: bold; color: #1a73e8;">മുഅല്ലിം വിഹിതം</div>
</div>
    <div id="report-btn" class="stat-card" onclick="showSection('report')" style="cursor:pointer; background:#e3f2fd; display:none;">
        <i class="fas fa-chart-line"></i><span>കളക്ഷൻ റിപ്പോർട്ട്</span>
    </div>
</div>
<div id="sadar-wrapper" style="display: none; padding: 10px;">
    <div class="sadar-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>ഉസ്താദുമാരുടെ വിഹിതം (Sadar Only)</h3>
            <button onclick="closeSadarSection()" style="background:#6c757d; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">തിരികെ</button>
        </div>
        
        <div class="input-grid">
            <div class="input-group">
                <label>വിഹിതം ഇനം:</label>
                <select id="contribution-type">
                    <option value="District">ജില്ലാ വിഹിതം</option>
                    <option value="State">സ്റ്റേറ്റ് വിഹിതം</option>
                </select>
            </div>
            <div class="input-group">
                <label>തീയതി:</label>
                <input type="date" id="m-date">
            </div>
            <div class="input-group">
                <label>Reg. No:</label>
                <input type="text" id="m-reg" placeholder="Reg. No">
            </div>
            <div class="input-group">
                <label>MSR No:</label>
                <input type="text" id="m-msr" placeholder="MSR No">
            </div>
            <div class="input-group full-width">
                <label>ഉസ്താദിന്റെ പേര്:</label>
                <input type="text" id="m-name" placeholder="Name of Mu-allim">
            </div>
            <div class="input-group">
                <label>Monthly Salary:</label>
                <input type="number" id="m-salary" oninput="calculateContribution()" placeholder="ശമ്പളം">
            </div>
            <div class="input-group">
                <label>Muallim Contribution (Daily):</label>
                <input type="number" id="m-contribution" placeholder="വിഹിതം" readonly class="readonly-field">
            </div>
        </div>
        <div class="input-group full-width" style="margin-top: 15px;">
            <label>Remarks:</label>
            <textarea id="m-remarks" rows="2" placeholder="കുറിപ്പുകൾ ഉണ്ടെങ്കിൽ ഇവിടെ നൽകാം"></textarea>
        </div>
        <button onclick="saveMuallimData()" id="save-btn" class="save-btn">വിവരങ്ങൾ സേവ് ചെയ്യുക</button>
    </div>

    <div class="history-container">
        <div class="history-header">
            <h3>വിഹിതം ഹിസ്റ്ററി</h3>
            <select id="history-year-filter" onchange="loadMuallimHistory()">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
        <div id="muallim-history-list"></div>
    </div>
</div>

                <div id="dynamic-content" class="content-area"></div>
            </div>

            <div id="student-view" style="display:none;" class="content-area">
                <div class="info-card">
                    <h3>എന്റെ പ്രൊഫൈൽ</h3>
                    <hr>
                    <div id="my-details-box" style="margin-top:15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="app.js"></script>
</body>
</html>
