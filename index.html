<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islahul Uloom - Smart Madrasa</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div id="login-page" class="page">
            <div class="auth-header">
                <i class="fas fa-mosque logo-icon"></i>
                <h1>Islahul Uloom Madrasa</h1>
                <p>സ്മാർട്ട് മദ്റസ പോർട്ടൽ</p>
            </div>
            <div class="form-container">
                <input type="text" id="login-id" placeholder="User ID">
                <input type="password" id="login-pass" placeholder="Password">
                <button onclick="loginUser()">Login</button>
                <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #666;">കുട്ടികൾക്കും ഐഡി ഉപയോഗിച്ച് ലോഗിൻ ചെയ്യാം</p>
            </div>
        </div>

        <div id="main-dashboard" class="page" style="display:none;">
            <header class="main-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">U</div>
                    <div>
                        <h2 id="display-name">Loading...</h2>
                        <p id="display-role">User</p>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-power-off"></i></button>
            </header>
<div id="usthad-view" style="display:none;">
    <div id="usthad-dashboard">
        <div class="stats-grid">
            <div class="stat-card" onclick="showSection('student-list')">
                <i class="fas fa-users"></i><span>കുട്ടികൾ</span>
            </div>

            <div class="stat-card" onclick="showSection('add-student')">
                <i class="fas fa-user-plus"></i><span>പുതിയ കുട്ടി</span>
            </div>

            <div id="gurunidhi-btn" class="stat-card" onclick="showSection('gurunidhi')" style="cursor:pointer; background: #fff8e1;">
                <i class="fas fa-box-open" style="color: #ffa000;"></i><span>ഗുരുനിധി ബോക്സ്</span>
            </div>

            <div id="muallim-btn" class="stat-card" onclick="showSection('sadar')" style="background: #e3f2fd; cursor: pointer; display: none;">
                <div style="font-size: 24px; margin-bottom: 5px;">👨‍🏫</div>
                <span style="color: #1a73e8; font-weight: bold;">മുഅല്ലിം വിഹിതം</span>
            </div>

            <div id="report-btn" class="stat-card" onclick="showSection('report')" style="cursor:pointer; background: #e3f2fd;">
                <i class="fas fa-chart-line" style="color: #1a73e8;"></i>
                <span style="color: #1a73e8; font-weight: bold;">കളക്ഷൻ റിപ്പോർട്ട്</span>
            </div>
        </div>
    </div>
    
    <div id="dynamic-content" class="content-area" style="display:none;"></div>
</div>

            <div id="student-view" style="display:none;" class="content-area">
                <div class="info-card">
                    <h3>എന്റെ പ്രൊഫൈൽ</h3>
                    <hr>
                    <div id="my-details-box" style="margin-top:15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="app.js"></script>
</body>
</html>
